// ============================================================
// Everything in this block exists only because this is a zero-build,
// single HTML file version of Bloomjar with no bundler and no npm
// packages beyond what's loaded via script tags above. It replaces:
//   - window.storage (Claude-artifact-only API) -> localStorage shim
//   - lucide-react icon components -> plain emoji/text glyphs
//   - recharts chart components -> hand-rolled SVG charts
// None of this changes what the app does — only how a few visuals
// are drawn and how data gets saved. Everything below this block is
// the actual app, unchanged.
// ============================================================

(function () {
  const PREFIX = "bloomjar:";
  function fullKey(key, shared) {
    return `${PREFIX}${shared ? "shared" : "personal"}:${key}`;
  }
  window.storage = {
    async get(key, shared = false) {
      const raw = localStorage.getItem(fullKey(key, shared));
      if (raw === null) throw new Error(`No value found for key "${key}"`);
      return { key, value: raw, shared };
    },
    async set(key, value, shared = false) {
      localStorage.setItem(fullKey(key, shared), value);
      return { key, value, shared };
    },
    async delete(key, shared = false) {
      const existed = localStorage.getItem(fullKey(key, shared)) !== null;
      localStorage.removeItem(fullKey(key, shared));
      return { key, deleted: existed, shared };
    },
    async list(prefix = "", shared = false) {
      const scope = `${PREFIX}${shared ? "shared" : "personal"}:`;
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(scope + prefix)) keys.push(k.slice(scope.length));
      }
      return { keys, prefix, shared };
    },
  };
})();

const { useState, useEffect, useMemo, useRef } = React;

// ---------- icon replacements ----------
// The real app uses lucide-react's SVG icon components. There's no reliable
// CDN build of that specific package for use without a bundler, so these
// stand in for them — same component names, same size/className/color
// props, so nothing elsewhere in the app needed to change.

function makeIcon(glyph) {
  return function Icon({ size = 16, className = "", color, style = {} }) {
    return (
      <span
        className={className}
        style={{ fontSize: size, lineHeight: 1, display: "inline-block", color, ...style }}
      >
        {glyph}
      </span>
    );
  };
}

// ---------- chart replacements ----------
// Stand-ins for the 4 recharts usages elsewhere in the app. Plain SVG,
// scales responsively via viewBox instead of measuring container size in
// JS, and — unlike recharts' hover tooltips, which don't work well on a
// touchscreen anyway — these print each value directly on the chart so
// nothing needs to be tapped to be readable.

function SimpleBarChart({ data, bars, xKey = "month", height = 260, yFormatter = (v) => v, showLegend = true }) {
  const W = 400, H = height;
  const padL = 44, padR = 8, padT = 20, padB = 28;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const stackGroups = {};
  bars.forEach((b) => {
    const g = b.stackId || b.key;
    if (!stackGroups[g]) stackGroups[g] = [];
    stackGroups[g].push(b);
  });
  const groupKeys = Object.keys(stackGroups);

  const totals = (data || []).map((d) =>
    groupKeys.map((g) => stackGroups[g].reduce((s, b) => s + (Number(d[b.key]) || 0), 0))
  );
  const maxVal = Math.max(1, ...totals.flat(), 0);
  const niceMax = (() => {
    const magnitude = Math.pow(10, Math.floor(Math.log10(maxVal || 1)));
    for (const s of [1, 2, 5, 10]) {
      if (maxVal <= s * magnitude) return s * magnitude;
    }
    return 10 * magnitude;
  })();

  const n = (data || []).length || 1;
  const slotW = plotW / n;
  const groupCount = groupKeys.length || 1;
  const barGap = 4;
  const barW = groupCount > 1 ? Math.max(3, (slotW - barGap * (groupCount + 1)) / groupCount) : Math.max(8, slotW * 0.5);

  function yFor(val) {
    return padT + plotH - (val / niceMax) * plotH;
  }

  return (
    <div>
      <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ overflow: "visible" }}>
        {[0, 0.25, 0.5, 0.75, 1].map((t) => {
          const val = niceMax * t;
          const y = yFor(val);
          return (
            <g key={t}>
              <line x1={padL} x2={W - padR} y1={y} y2={y} stroke="#EDE9FE" strokeWidth="1" />
              <text x={padL - 6} y={y + 3} fontSize="9" fill="#8B84AE" textAnchor="end">{yFormatter(Math.round(val))}</text>
            </g>
          );
        })}
        {(data || []).map((d, i) => {
          const slotX = padL + i * slotW;
          return (
            <g key={i}>
              {groupKeys.map((g, gi) => {
                let yCursor = padT + plotH;
                const stackBars = stackGroups[g];
                const isStacked = stackBars.length > 1;
                const x = isStacked
                  ? slotX + (slotW - barW) / 2
                  : slotX + barGap + gi * (barW + barGap);
                return stackBars.map((b, bi) => {
                  const val = Number(d[b.key]) || 0;
                  const barH = (val / niceMax) * plotH;
                  const y = yCursor - barH;
                  yCursor -= barH;
                  const isTop = bi === stackBars.length - 1;
                  return (
                    <rect
                      key={b.key}
                      x={x}
                      y={Math.max(padT, y)}
                      width={barW}
                      height={Math.max(0, barH)}
                      fill={b.color}
                      rx={isTop ? 3 : 0}
                    />
                  );
                });
              })}
              <text x={slotX + slotW / 2} y={H - 8} fontSize="9" fill="#8B84AE" textAnchor="middle">{d[xKey]}</text>
            </g>
          );
        })}
      </svg>
      {showLegend && (
        <div className="flex flex-wrap gap-3 justify-center mt-2">
          {bars.map((b) => (
            <div key={b.key} className="flex items-center gap-1.5 text-xs bj-muted">
              <span className="w-2.5 h-2.5 rounded-full" style={{ background: b.color }} />
              {b.key}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SimpleLineChart({ data, xKey = "month", yKey = "value", height = 220, color = "#7C5CFC", showAxes = true, yFormatter = (v) => v, xFormatter = (v) => v }) {
  const W = 400, H = height;
  const padL = showAxes ? 48 : 4;
  const padR = 8;
  const padT = 10;
  const padB = showAxes ? 24 : 4;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const rows = data || [];
  const values = rows.map((d) => Number(d[yKey]) || 0);
  const minVal = Math.min(...values, 0);
  const maxVal = Math.max(...values, 1);
  const range = maxVal - minVal || 1;

  const n = rows.length;
  function xFor(i) { return n <= 1 ? padL : padL + (i / (n - 1)) * plotW; }
  function yFor(v) { return padT + plotH - ((v - minVal) / range) * plotH; }

  const points = rows.map((d, i) => `${xFor(i)},${yFor(Number(d[yKey]) || 0)}`).join(" ");

  return (
    <svg width="100%" height={height} viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none" style={{ overflow: "visible" }}>
      {showAxes && [0, 0.5, 1].map((t) => {
        const val = minVal + range * t;
        const y = yFor(val);
        return (
          <g key={t}>
            <line x1={padL} x2={W - padR} y1={y} y2={y} stroke="#EDE9FE" strokeWidth="1" />
            <text x={padL - 6} y={y + 3} fontSize="9" fill="#8B84AE" textAnchor="end">{yFormatter(Math.round(val))}</text>
          </g>
        );
      })}
      {n > 1 && (
        <polyline points={points} fill="none" stroke={color} strokeWidth={showAxes ? 2.5 : 2} strokeLinecap="round" strokeLinejoin="round" />
      )}
      {showAxes && rows.map((d, i) => {
        if (n > 8 && i % Math.ceil(n / 6) !== 0 && i !== n - 1) return null;
        return (
          <text key={i} x={xFor(i)} y={H - 6} fontSize="9" fill="#8B84AE" textAnchor="middle">{xFormatter(d[xKey])}</text>
        );
      })}
    </svg>
  );
}

// ---------- storage ----------

async function loadKey(key, fallback) {
  try {
    const res = await window.storage.get(key, false);
    if (res && res.value) return JSON.parse(res.value);
    return fallback;
  } catch {
    return fallback;
  }
}
async function saveKey(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), false);
  } catch (e) {
    console.error("save failed", key, e);
  }
}

async function hashPin(pin) {
  try {
    const data = new TextEncoder().encode(`bloomjar-pin-${pin}`);
    const buf = await crypto.subtle.digest("SHA-256", data);
    return Array.from(new Uint8Array(buf)).map((b) => b.toString(16).padStart(2, "0")).join("");
  } catch {
    // Fallback if Web Crypto isn't available in this environment — not cryptographically
    // strong, but this is a soft on-device lock, not real encryption, either way.
    let h = 0;
    for (let i = 0; i < pin.length; i++) h = (h * 31 + pin.charCodeAt(i)) | 0;
    return String(h);
  }
}

function topAncestor(categories, catId) {
  let cur = categories.find((c) => c.id === catId);
  if (!cur) return null;
  while (cur.parentId) {
    const parent = categories.find((c) => c.id === cur.parentId);
    if (!parent) break;
    cur = parent;
  }
  return cur;
}

function catDisplay(categories, catId) {
  const cat = categories.find((c) => c.id === catId);
  if (!cat) return { name: "Uncategorized", color: "#94A3B8", icon: "❔" };
  if (cat.color && cat.icon) return cat;
  const top = topAncestor(categories, catId);
  return { ...cat, color: cat.color || top?.color || "#94A3B8", icon: cat.icon || top?.icon || "❔" };
}

function simulateAvalanche(debts, extra) {
  const active = debts.filter((d) => Number(d.balance) > 0);
  if (active.length === 0) return { months: 0, totalInterest: 0, schedule: [{ month: 0, total: 0 }], payoffMonth: {}, order: [] };

  let bals = active.map((d) => ({ id: d.id, balance: Number(d.balance), apr: Number(d.apr) || 0, minPayment: Number(d.minPayment) || 0 }));
  const order = [...bals].sort((a, b) => b.apr - a.apr).map((d) => d.id);
  let month = 0;
  let totalInterest = 0;
  const schedule = [{ month: 0, total: bals.reduce((s, d) => s + d.balance, 0) }];
  const payoffMonth = {};
  const maxMonths = 600;

  while (bals.some((d) => d.balance > 0.01) && month < maxMonths) {
    month++;
    bals.forEach((d) => {
      if (d.balance > 0.01) {
        const interest = d.balance * (d.apr / 100 / 12);
        totalInterest += interest;
        d.balance += interest;
      }
    });
    let pool = Number(extra) || 0;
    bals.forEach((d) => { if (d.balance <= 0.01) pool += d.minPayment; });
    bals.forEach((d) => {
      if (d.balance > 0.01) {
        const pay = Math.min(d.minPayment, d.balance);
        d.balance -= pay;
      }
    });
    for (const id of order) {
      if (pool <= 0) break;
      const d = bals.find((x) => x.id === id);
      if (d.balance > 0.01) {
        const pay = Math.min(pool, d.balance);
        d.balance -= pay;
        pool -= pay;
      }
    }
    bals.forEach((d) => {
      if (d.balance < 0) d.balance = 0;
      if (d.balance <= 0.01 && payoffMonth[d.id] === undefined) payoffMonth[d.id] = month;
    });
    schedule.push({ month, total: Math.round(bals.reduce((s, d) => s + Math.max(0, d.balance), 0)) });
  }

  return { months: month, totalInterest, schedule, payoffMonth, order };
}

function simulateMinimumOnly(debts) {
  const active = debts.filter((d) => Number(d.balance) > 0);
  if (active.length === 0) return { months: 0, totalInterest: 0, neverPaysOff: false };
  let bals = active.map((d) => ({ balance: Number(d.balance), apr: Number(d.apr) || 0, minPayment: Number(d.minPayment) || 0 }));
  let month = 0;
  let totalInterest = 0;
  const maxMonths = 600;
  while (bals.some((d) => d.balance > 0.01) && month < maxMonths) {
    month++;
    bals.forEach((d) => {
      if (d.balance > 0.01) {
        const interest = d.balance * (d.apr / 100 / 12);
        totalInterest += interest;
        d.balance += interest;
        const pay = Math.min(d.minPayment, d.balance);
        d.balance -= pay;
      }
    });
  }
  return { months: month, totalInterest, neverPaysOff: month >= maxMonths && bals.some((d) => d.balance > 0.01) };
}

function normalizeNote(note) {
  return (note || "").trim().toLowerCase().replace(/[^a-z0-9 ]/g, "").replace(/\s+/g, " ");
}

function suggestCategoryFromMap(map, note) {
  const key = normalizeNote(note);
  if (!key) return null;
  let bucket = map[key];
  if (!bucket) {
    const firstWord = key.split(" ")[0];
    if (firstWord) {
      const matchKey = Object.keys(map).find((k) => k.includes(firstWord) || firstWord.includes(k));
      if (matchKey) bucket = map[matchKey];
    }
  }
  if (!bucket) return null;
  const best = Object.entries(bucket).sort((a, b) => b[1] - a[1])[0];
  return best ? best[0] : null;
}

function detectRecurring(transactions) {
  const groups = {};
  transactions.forEach((t) => {
    if (t.type === "transfer") return;
    const noteKey = normalizeNote(t.note);
    if (!noteKey) return;
    const key = `${t.accountId}|${noteKey}|${t.type}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(t);
  });

  const recurring = [];
  Object.values(groups).forEach((txns) => {
    if (txns.length < 2) return;
    const sorted = [...txns].sort((a, b) => new Date(a.date) - new Date(b.date));
    const amounts = sorted.map((t) => Number(t.amount));
    const lastAmount = amounts[amounts.length - 1];
    const baselineAmounts = amounts.slice(0, -1);
    const baselineAvg = baselineAmounts.length ? baselineAmounts.reduce((s, a) => s + a, 0) / baselineAmounts.length : lastAmount;
    const baselineConsistent = baselineAmounts.every((a) => Math.abs(a - baselineAvg) <= baselineAvg * 0.15 + 0.01);
    if (!baselineConsistent) return;
    const priceIncreasePct = baselineAvg > 0 ? ((lastAmount - baselineAvg) / baselineAvg) * 100 : 0;
    // A big jump could also just mean the pattern broke — cap how far off we still call "recurring".
    if (Math.abs(priceIncreasePct) > 60) return;

    const gaps = [];
    for (let i = 1; i < sorted.length; i++) {
      gaps.push((new Date(sorted[i].date) - new Date(sorted[i - 1].date)) / 86400000);
    }
    const avgGap = gaps.reduce((s, g) => s + g, 0) / gaps.length;
    let freq = null;
    if (avgGap >= 6 && avgGap <= 8) freq = "weekly";
    else if (avgGap >= 13 && avgGap <= 16) freq = "biweekly";
    else if (avgGap >= 27 && avgGap <= 32) freq = "monthly";
    else if (avgGap >= 350 && avgGap <= 380) freq = "yearly";
    if (!freq) return;

    const last = sorted[sorted.length - 1];
    const nextDate = new Date(last.date);
    if (freq === "weekly") nextDate.setDate(nextDate.getDate() + 7);
    if (freq === "biweekly") nextDate.setDate(nextDate.getDate() + 14);
    if (freq === "monthly") nextDate.setMonth(nextDate.getMonth() + 1);
    if (freq === "yearly") nextDate.setFullYear(nextDate.getFullYear() + 1);

    recurring.push({
      key: `${last.accountId}-${normalizeNote(last.note)}-${last.type}`,
      note: last.note, accountId: last.accountId, categoryId: last.categoryId,
      type: last.type, avgAmount: lastAmount, freq, nextDate, count: sorted.length,
      priceIncreasePct: priceIncreasePct >= 10 ? priceIncreasePct : 0,
      previousAmount: priceIncreasePct >= 10 ? baselineAvg : null,
    });
  });

  return recurring.sort((a, b) => a.nextDate - b.nextDate);
}

function monthlyEquivalent(freq, amount) {
  if (freq === "weekly") return amount * 4.33;
  if (freq === "biweekly") return amount * 2.17;
  if (freq === "yearly") return amount / 12;
  return amount;
}

function findDuplicate(candidate, existing) {
  const candDate = new Date(candidate.date).getTime();
  const candNote = normalizeNote(candidate.note);
  return existing.find((t) => {
    if (t.accountId !== candidate.accountId) return false;
    if (Math.abs(Number(t.amount) - candidate.amount) > 0.01) return false;
    if (Math.abs(new Date(t.date).getTime() - candDate) > 2 * 86400000) return false;
    // Same account, same amount, within 2 days: treat as a duplicate even if notes differ
    // slightly (common with bank CSVs re-wording the same transaction between exports).
    if (candNote && normalizeNote(t.note) && candNote !== normalizeNote(t.note)) {
      // Notes present on both sides and clearly different — likely a coincidence, not a dup.
      return false;
    }
    return true;
  });
}

    const todayKey = new Date().toISOString().slice(0, 10);

      const todayEntry = prev.find((e) => e.date === todayKey);
      if (todayEntry && todayEntry.value === netWorth) return prev;
      const filtered = prev.filter((e) => e.date !== todayKey);
      return [...filtered, { date: todayKey, value: netWorth }].sort((a, b) => a.date.localeCompare(b.date)).slice(-180);
    });
  }, [netWorth, loaded]);

  const monthlyData = useMemo(() => {
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push(monthKey(d));
    }
    const map = Object.fromEntries(months.map((k) => [k, { month: monthLabel(k), Income: 0, Expenses: 0 }]));
    transactions.forEach((t) => {
      const k = monthKey(new Date(t.date));
      if (!map[k]) return;
      if (t.type === "income") map[k].Income += Number(t.amount);
      else map[k].Expenses += Number(t.amount);
    });
    return months.map((k) => map[k]);
  }, [transactions]);

  const thisMonthKey = monthKey(new Date());
  const thisMonthTxns = transactions.filter((t) => monthKey(new Date(t.date)) === thisMonthKey);
  const monthIncome = thisMonthTxns.filter((t) => t.type === "income").reduce((s, t) => s + Number(t.amount), 0);

      needs: { allocated: incomeTarget * (Number(budgetSettings.needsPct) / 100), spent: groups.needs },

      const key = monthKey(d);

      const target = budgetSettings.useCustomIncome ? Number(budgetSettings.customIncome || 0) : income;
      const groups = { needs: 0, wants: 0, savings: 0 };
      monthTxns.filter((t) => t.type === "expense").forEach((t) => {
        const top = topAncestor(categories, t.categoryId);
        const group = categoryGroups[top?.id];
        if (group && groups[group] !== undefined) groups[group] += Number(t.amount);

      const allocated = target;
      const spent = groups.needs + groups.wants + groups.savings;

    const now = new Date();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
    const daysElapsed = now.getDate();
    const daysLeft = Math.max(1, daysInMonth - daysElapsed + 1);
    const perDay = remaining / daysLeft;
    const idealSpentByNow = discretionaryAllocated * (daysElapsed / daysInMonth);
    const pace = idealSpentByNow > 0 ? discretionarySpent / idealSpentByNow : 0;
    return { remaining, perDay, daysLeft, pace, hasBudget: discretionaryAllocated > 0 };
  }, [budgetStats]);

  const spendingTrends = useMemo(() => {
    const now = new Date();
    const thisKey = monthKey(now);
    const priorKeys = [1, 2, 3].map((i) => monthKey(new Date(now.getFullYear(), now.getMonth() - i, 1)));
    const topExpenseCats = categories.filter((c) => !c.parentId && c.id !== "cat-income");
    const daysElapsed = now.getDate();
    const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();

    return topExpenseCats
      .map((cat) => {
        const priorTotals = priorKeys.map((k) =>
          transactions
            .filter((t) => t.type === "expense" && monthKey(new Date(t.date)) === k && topAncestor(categories, t.categoryId)?.id === cat.id)
            .reduce((s, t) => s + Number(t.amount), 0)
        );
        const priorAvg = priorTotals.reduce((s, v) => s + v, 0) / priorTotals.length;
        const currentSpent = transactions
          .filter((t) => t.type === "expense" && monthKey(new Date(t.date)) === thisKey && topAncestor(categories, t.categoryId)?.id === cat.id)
          .reduce((s, t) => s + Number(t.amount), 0);
        const projected = daysElapsed > 0 ? currentSpent * (daysInMonth / daysElapsed) : currentSpent;
        const pctChange = priorAvg > 5 ? ((projected - priorAvg) / priorAvg) * 100 : 0;
        return { category: cat, priorAvg, currentSpent, projected, pctChange };
      })
      .filter((t) => t.priorAvg > 5 && t.pctChange >= 25)
      .sort((a, b) => b.pctChange - a.pctChange);
  }, [transactions, categories]);

  const avalanche = useMemo(() => simulateAvalanche(debts, extraPayment), [debts, extraPayment]);
  const minimumOnly = useMemo(() => simulateMinimumOnly(debts), [debts]);
  const totalDebt = debts.reduce((s, d) => s + Number(d.balance), 0);
  const totalMinPayments = debts.reduce((s, d) => s + Number(d.minPayment), 0);
  const debtFreeDate = useMemo(() => {
    if (avalanche.months === 0) return null;
    const d = new Date();
    d.setMonth(d.getMonth() + avalanche.months);
    return d;
  }, [avalanche.months]);

  const recurring = useMemo(
    () => detectRecurring(transactions).filter((r) => !dismissedRecurring.includes(r.key)),
    [transactions, dismissedRecurring]
  );

  function dismissRecurring(key) {
    setDismissedRecurring((prev) => (prev.includes(key) ? prev : [...prev, key]));
  }
  function restoreDismissedRecurring() {
    setDismissedRecurring([]);
  }

  const alerts = useMemo(() => {
    const list = [];
    Object.entries(budgetStats).forEach(([key, v]) => {
      if (v.allocated <= 0) return;
      const pct = v.spent / v.allocated;
      if (pct >= 1) list.push({ id: `budget-${key}`, level: "danger", text: `${GROUP_INFO[key].label} is over budget (${money(v.spent)} of ${money(v.allocated)}).` });
      else if (pct >= 0.9) list.push({ id: `budget-${key}`, level: "warn", text: `${GROUP_INFO[key].label} is at ${Math.round(pct * 100)}% of budget.` });
    });
    goals.forEach((g) => {
      if (Number(g.currentAmount) >= Number(g.targetAmount)) {
        list.push({ id: `goal-done-${g.id}`, level: "good", text: `Goal complete: ${g.name}! 🎉` });
      } else if (g.targetDate && new Date(g.targetDate) < new Date()) {
        list.push({ id: `goal-late-${g.id}`, level: "warn", text: `${g.name} is past its target date.` });
      }
    });
    if (debts.length > 0 && totalDebt <= 0) {
      list.push({ id: "debt-free", level: "good", text: "You're debt-free! 🎉" });
    }
    const twoWeeksMs = 14 * 24 * 60 * 60 * 1000;
    const daysSinceBackup = lastBackupAt ? (Date.now() - lastBackupAt) / (24 * 60 * 60 * 1000) : null;
    if (transactions.length > 0 && (!lastBackupAt || Date.now() - lastBackupAt > twoWeeksMs)) {
      list.push({
        id: "backup-reminder",
        level: "warn",
        text: lastBackupAt
          ? `It's been ${Math.floor(daysSinceBackup)} days since your last backup. Export one from Accounts.`
          : "You haven't backed up your data yet. Export a JSON backup from Accounts.",
      });
    }
    if (safeToSpend.hasBudget && safeToSpend.pace >= 1.3) {
      list.push({ id: "pace-warning", level: "warn", text: `You're spending ${Math.round((safeToSpend.pace - 1) * 100)}% faster than your budget pace this month.` });
    }
    spendingTrends.slice(0, 3).forEach((t) => {
      list.push({ id: `trend-${t.category.id}`, level: "warn", text: `${t.category.name} is trending ${Math.round(t.pctChange)}% higher than your recent average.` });
    });
    recurring.filter((r) => r.priceIncreasePct > 0).forEach((r) => {
      list.push({ id: `price-hike-${r.key}`, level: "warn", text: `${r.note} went up ${Math.round(r.priceIncreasePct)}% (${money(r.previousAmount)} → ${money(r.avgAmount)}).` });
    });
    return list;
  }, [budgetStats, goals, debts, totalDebt, transactions.length, lastBackupAt, safeToSpend, spendingTrends, recurring]);

  useEffect(() => {
    if (!loaded) return;
    alerts.forEach((a) => {
      if (notifiedRef.current.has(a.id)) return;
      notifiedRef.current.add(a.id);
      try {
        if (typeof Notification !== "undefined") {
          if (Notification.permission === "granted") new Notification("Bloomjar", { body: a.text });
          else if (Notification.permission !== "denied") Notification.requestPermission();
        }
      } catch {}
    });
  }, [alerts, loaded]);

  const filteredTxns = useMemo(() => {
    const list = transactions
      .filter((t) => (filterCat === "all" ? true : topAncestor(categories, t.categoryId)?.id === filterCat))
      .filter((t) => (filterAcc === "all" ? true : t.accountId === filterAcc || t.toAccountId === filterAcc))
      .filter((t) => (search ? (t.note || "").toLowerCase().includes(search.toLowerCase()) : true));
    if (sortBy === "amount") return list.sort((a, b) => Number(b.amount) - Number(a.amount));
    if (sortBy === "category") return list.sort((a, b) => catDisplay(categories, a.categoryId).name.localeCompare(catDisplay(categories, b.categoryId).name));
    return list.sort((a, b) => new Date(b.date) - new Date(a.date));
  }, [transactions, filterCat, filterAcc, search, sortBy, categories]);

  const suggestCategory = (note) => suggestCategoryFromMap(merchantMap, note);

  function upsertTxn(txn) {
    const isNew = !transactions.some((t) => t.id === txn.id);
    setTransactions((prev) => {
      const exists = prev.some((t) => t.id === txn.id);
      return exists ? prev.map((t) => (t.id === txn.id ? txn : t)) : [txn, ...prev];
    });
    if (txn.note && txn.categoryId) {
      const key = normalizeNote(txn.note);
      if (key) {
        setMerchantMap((prev) => {
          const bucket = { ...(prev[key] || {}) };
          bucket[txn.categoryId] = (bucket[txn.categoryId] || 0) + 1;
          return { ...prev, [key]: bucket };
        });
      }
    }
    if (isNew && txn.type === "expense" && roundUpGoalId) {
      const roundUp = Math.ceil(txn.amount) - txn.amount;
      if (roundUp > 0.001) {
        setGoals((prev) => prev.map((g) => (g.id === roundUpGoalId ? { ...g, currentAmount: Number(g.currentAmount) + roundUp } : g)));
      }
    }
    setShowTxnModal(false);
    setEditingTxn(null);
  }
  function deleteTxn(id) {
    const txn = transactions.find((t) => t.id === id);
    if (!txn) return;
    setTransactions((prev) => prev.filter((t) => t.id !== id));
    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
    undoTimeoutRef.current = setTimeout(() => setUndoTxn(null), 5000);
    setUndoTxn(txn);
  }
  function undoDeleteTxn() {
    if (!undoTxn) return;
    if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current);
    setTransactions((prev) => [undoTxn, ...prev]);
    setUndoTxn(null);
  }
  function upsertAccount(acc) {
    setAccounts((prev) => {
      const exists = prev.some((a) => a.id === acc.id);
      return exists ? prev.map((a) => (a.id === acc.id ? acc : a)) : [...prev, acc];
    });
    setShowAccountModal(false);
    setEditingAccount(null);
  }
  function deleteAccount(id) {
    if (!window.confirm("Delete this account? Transactions logged to it will stay but show as unassigned.")) return;
    setAccounts((prev) => prev.filter((a) => a.id !== id));
  }
  function upsertCategory(cat) {
    setCategories((prev) => {
      const exists = prev.some((c) => c.id === cat.id);
      return exists ? prev.map((c) => (c.id === cat.id ? cat : c)) : [...prev, cat];
    });
    setShowCategoryModal(false);
    setEditingCategory(null);
  }
  function deleteCategory(id) {
    const hasSubs = categories.some((c) => c.parentId === id);
    if (hasSubs) {
      alert("Delete or reassign its subcategories first.");
      return;
    }
    const inUse = transactions.some((t) => t.categoryId === id);
    const msg = inUse
      ? "This category is used on existing transactions — they'll show as Uncategorized. Delete anyway?"
      : "Delete this category?";
    if (!window.confirm(msg)) return;
    setCategories((prev) => prev.filter((c) => c.id !== id));
    setCategoryGroups((prev) => {
      const next = { ...prev };
      delete next[id];
      return next;
    });
  }
  function upsertGoal(goal) {
    setGoals((prev) => {
      const exists = prev.some((g) => g.id === goal.id);
      return exists ? prev.map((g) => (g.id === goal.id ? goal : g)) : [...prev, goal];
    });
    setShowGoalModal(false);
    setEditingGoal(null);
  }
  function deleteGoal(id) {
    if (!window.confirm("Delete this goal? This can't be undone.")) return;
    setGoals((prev) => prev.filter((g) => g.id !== id));
    if (roundUpGoalId === id) setRoundUpGoalId("");
  }
  function addFundsToGoal(goalId, amount, fromAccountId) {
    setGoals((prev) => prev.map((g) => (g.id === goalId ? { ...g, currentAmount: Number(g.currentAmount) + amount } : g)));
    if (fromAccountId) {
      setAccounts((prev) => prev.map((a) => (a.id === fromAccountId ? { ...a, balance: Number(a.balance) - amount } : a)));
    }
    setShowFundsModal(false);
    setFundsGoal(null);
  }
  function updateCategoryGroup(catId, group) {
    setCategoryGroups((prev) => ({ ...prev, [catId]: group }));
  }
  function upsertDebt(debt) {
    setDebts((prev) => {
      const exists = prev.some((d) => d.id === debt.id);
      return exists ? prev.map((d) => (d.id === debt.id ? debt : d)) : [...prev, debt];
    });
    setShowDebtModal(false);
    setEditingDebt(null);
  }
  function deleteDebt(id) {
    if (!window.confirm("Delete this debt from your payoff plan?")) return;
    setDebts((prev) => prev.filter((d) => d.id !== id));
  }

  function exportData() {
    const blob = new Blob([JSON.stringify({
      accounts, categories, transactions, budgetSettings, categoryGroups, goals, debts, extraPayment,
    }, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `bloomjar-backup-${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setLastBackupAt(Date.now());
  }
  function importData(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (data.accounts) setAccounts(data.accounts);
        if (data.categories) setCategories(data.categories);
        if (data.transactions) setTransactions(data.transactions);
        if (data.budgetSettings) setBudgetSettings(data.budgetSettings);
        if (data.categoryGroups) setCategoryGroups(data.categoryGroups);
        if (data.goals) setGoals(data.goals);
        if (data.debts) setDebts(data.debts);
        if (data.extraPayment !== undefined) setExtraPayment(data.extraPayment);
        setLastBackupAt(Date.now());
      } catch {
        alert("Could not read that file. Make sure it's a Bloomjar JSON backup.");
      }
    };
    reader.readAsText(file);
  }

  async function setPin(pin) {
    const hash = await hashPin(pin);
    setPinHash(hash);
    setLocked(false);
    setShowPinSetup(false);
  }
  function removePin() {
    if (!window.confirm("Remove the PIN lock?")) return;
    setPinHash(null);
    saveKey("bloomjar:pinHash", null);
  }
  async function tryUnlock(pin) {
    const hash = await hashPin(pin);
    if (hash === pinHash) {
      setLocked(false);
      return true;
    }
    return false;
  }

  function confirmRecurring(r) {
    const txn = {
      id: uid(),
      type: r.type,
      amount: r.avgAmount,
      date: new Date().toISOString(),
      accountId: r.accountId,
      categoryId: r.categoryId,
      note: r.note,
    };
    upsertTxn(txn);
  }

  function finishOnboarding() {
    setOnboardingDone(true);
    setShowOnboarding(false);
  }

  if (!loaded) {
    return (
      <div
        style={{ fontFamily: "Inter, sans-serif", background: "#FAF9FF" }}
        className="min-h-screen flex items-center justify-center bj-loading-bg"
      >
        <style>{`@media (prefers-color-scheme: dark) { .bj-loading-bg { background: #15121F !important; } }`}</style>
        <Loader2 className="animate-spin text-violet-500" size={32} />
      </div>
    );
  }

  if (locked) {
    return <LockScreen onUnlock={tryUnlock} />;
  }

  return (
    <div className="min-h-screen bj-bg bj-text">
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');
        .font-display { font-family: 'Fredoka', sans-serif; }
        .font-body { font-family: 'Inter', sans-serif; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-thumb { background: #D8CEFA; border-radius: 999px; }

        /* Design tokens: plain CSS, not Tailwind arbitrary-value classes, since this
           environment has no JIT compiler to generate bracket-value utilities on the fly.
           Keyed off prefers-color-scheme to match how the dark: utility variants behave here
           (no .dark class is ever toggled anywhere in the app). */
        .bj-bg { background: #FAF9FF; }
        .bj-header { background: rgba(250, 249, 255, 0.9); }
        .bj-card { background: #FFFFFF; }
        .bj-text { color: #221D34; }
        .bj-muted { color: #6B6480; }
        .bj-nav-text { color: #4B4568; }
        .bj-ring { border-color: #221D34; }
        .bj-edge-fade { background: linear-gradient(to left, #FAF9FF, transparent); }
        @media (prefers-color-scheme: dark) {
          .bj-bg { background: #15121F; }
          .bj-header { background: rgba(21, 18, 31, 0.9); }
          .bj-card { background: #1E1A2E; }
          .bj-input-dark { background: #26213A; }
          .bj-text { color: #F1EEFB; }
          .bj-muted { color: #ADA3CC; }
          .bj-ring { border-color: #FFFFFF; }
          .bj-edge-fade { background: linear-gradient(to left, #15121F, transparent); }
        }
      `}</style>

      <div className="font-body">
        <TopNav page={page} setPage={setPage} alerts={alerts} onAdd={() => { setEditingTxn(null); setShowTxnModal(true); }} />

        <main className="max-w-5xl mx-auto px-4 sm:px-6 py-8">
          {page === "dashboard" && (
            <Dashboard
              netWorth={netWorth}
              netWorthHistory={netWorthHistory}
              monthlyData={monthlyData}
              monthIncome={monthIncome}
              monthExpense={monthExpense}
              savingsRate={savingsRate}
              transactions={transactions}
              categories={categories}
              accounts={accounts}
              recurring={recurring}
              onConfirmRecurring={confirmRecurring}
              onDismissRecurring={dismissRecurring}
              dismissedCount={dismissedRecurring.length}
              onRestoreDismissed={restoreDismissedRecurring}
              safeToSpend={safeToSpend}
              spendingTrends={spendingTrends}
            />
          )}

          {page === "transactions" && (
            <TransactionsPage
              txns={filteredTxns}
              allTxns={transactions}
              categories={categories}
              accounts={accounts}
              search={search} setSearch={setSearch}
              filterCat={filterCat} setFilterCat={setFilterCat}
              filterAcc={filterAcc} setFilterAcc={setFilterAcc}
              sortBy={sortBy} setSortBy={setSortBy}
              onEdit={(t) => { setEditingTxn(t); setShowTxnModal(true); }}
              onDelete={deleteTxn}
              onImport={() => setShowImport(true)}
            />
          )}

          {page === "budgets" && (
            <BudgetsPage
              budgetSettings={budgetSettings}
              setBudgetSettings={setBudgetSettings}
              categories={categories}
              categoryGroups={categoryGroups}
              updateCategoryGroup={updateCategoryGroup}
              budgetStats={budgetStats}
              incomeTarget={incomeTarget}
              budgetHistory={budgetHistory}
            />
          )}
          {page === "goals" && (
            <GoalsPage
              goals={goals}
              onAdd={() => { setEditingGoal(null); setShowGoalModal(true); }}
              onEdit={(g) => { setEditingGoal(g); setShowGoalModal(true); }}
              onDelete={deleteGoal}
              onAddFunds={(g) => { setFundsGoal(g); setShowFundsModal(true); }}
              roundUpGoalId={roundUpGoalId}
              setRoundUpGoalId={setRoundUpGoalId}
            />
          )}
          {page === "debt" && (
            <DebtPage
              debts={debts}
              extraPayment={extraPayment}
              setExtraPayment={setExtraPayment}
              avalanche={avalanche}
              minimumOnly={minimumOnly}
              totalDebt={totalDebt}
              totalMinPayments={totalMinPayments}
              debtFreeDate={debtFreeDate}
              onAdd={() => { setEditingDebt(null); setShowDebtModal(true); }}
              onEdit={(d) => { setEditingDebt(d); setShowDebtModal(true); }}
              onDelete={deleteDebt}
            />
          )}

          {page === "accounts" && (
            <AccountsPage
              accounts={accounts}
              categories={categories}
              onAdd={() => { setEditingAccount(null); setShowAccountModal(true); }}
              onEdit={(a) => { setEditingAccount(a); setShowAccountModal(true); }}
              onDelete={deleteAccount}
              onExport={exportData}
              onImportFile={importData}
              onAddCategory={() => { setEditingCategory(null); setShowCategoryModal(true); }}
              onEditCategory={(c) => { setEditingCategory(c); setShowCategoryModal(true); }}
              onDeleteCategory={deleteCategory}
              hasPin={!!pinHash}
              onSetPin={() => setShowPinSetup(true)}
              onRemovePin={removePin}
            />
          )}
        </main>
      </div>

      {showTxnModal && (
        <TxnModal
          txn={editingTxn}
          accounts={accounts}
          categories={categories}
          suggestCategory={suggestCategory}
          onClose={() => { setShowTxnModal(false); setEditingTxn(null); }}
          onSave={upsertTxn}
        />
      )}
      {showAccountModal && (
        <AccountModal
          account={editingAccount}
          onClose={() => { setShowAccountModal(false); setEditingAccount(null); }}
          onSave={upsertAccount}
        />
      )}
      {showImport && (
        <ImportModal
          accounts={accounts}
          categories={categories}
          suggestCategory={suggestCategory}
          existingTransactions={transactions}
          onClose={() => setShowImport(false)}
          onImport={(rows) => { setTransactions((prev) => [...rows, ...prev]); setShowImport(false); }}
        />
      )}
      {showGoalModal && (
        <GoalModal
          goal={editingGoal}
          onClose={() => { setShowGoalModal(false); setEditingGoal(null); }}
          onSave={upsertGoal}
        />
      )}
      {showFundsModal && fundsGoal && (
        <FundsModal
          goal={fundsGoal}
          accounts={accounts}
          onClose={() => { setShowFundsModal(false); setFundsGoal(null); }}
          onAdd={addFundsToGoal}
        />
      )}
      {showDebtModal && (
        <DebtModal
          debt={editingDebt}
          onClose={() => { setShowDebtModal(false); setEditingDebt(null); }}
          onSave={upsertDebt}
        />
      )}
      {showCategoryModal && (
        <CategoryModal
          category={editingCategory}
          categories={categories}
          onClose={() => { setShowCategoryModal(false); setEditingCategory(null); }}
          onSave={upsertCategory}
        />
      )}
      {showPinSetup && (
        <PinSetupModal onClose={() => setShowPinSetup(false)} onSave={setPin} />
      )}
      {showOnboarding && <OnboardingModal onDone={finishOnboarding} />}
      {undoTxn && (
        <UndoToast
          text="Transaction deleted"
          onUndo={undoDeleteTxn}
          onDismiss={() => { if (undoTimeoutRef.current) clearTimeout(undoTimeoutRef.current); setUndoTxn(null); }}
        />
      )}
    </div>
  );
}

// ---------- nav ----------

function TopNav({ page, setPage, onAdd, alerts }) {
  const [open, setOpen] = useState(false);
  const mobileNavRef = useRef(null);
  const items = [
    { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
    { id: "transactions", label: "Transactions", icon: Receipt },
    { id: "budgets", label: "Budgets", icon: Target },
    { id: "goals", label: "Goals", icon: PiggyBank },
    { id: "debt", label: "Debt", icon: CreditCard },
    { id: "accounts", label: "Accounts", icon: Wallet },
  ];

  useEffect(() => {
    const container = mobileNavRef.current;
    if (!container) return;
    const activeBtn = container.querySelector(`[data-navid="${page}"]`);
    if (activeBtn) activeBtn.scrollIntoView({ behavior: "smooth", inline: "center", block: "nearest" });
  }, [page]);

  return (
    <header className="sticky top-0 z-20 backdrop-blur bj-header border-b border-violet-100 dark:border-violet-900/40">
      <div className="max-w-5xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between gap-4">
        <div className="font-display font-bold text-2xl bg-gradient-to-r from-violet-600 to-pink-500 bg-clip-text text-transparent select-none">
          Bloomjar
        </div>
        <nav className="hidden md:flex items-center gap-1 overflow-x-auto">
          {items.map((it) => {
            const Icon = it.icon;
            const active = page === it.id;
            return (
              <button
                key={it.id}
                onClick={() => setPage(it.id)}
                className={`flex items-center gap-1.5 px-3.5 py-2 rounded-full text-sm font-medium transition-colors whitespace-nowrap ${
                  active
                    ? "bg-violet-600 text-white shadow-sm"
                    : "bj-nav-text dark:text-violet-200 hover:bg-violet-100 dark:hover:bg-violet-900/40"
                }`}
              >
                <Icon size={16} /> {it.label}
              </button>
            );
          })}
        </nav>
        <div className="flex items-center gap-2 shrink-0">
          <div className="relative">
            <button
              onClick={() => setOpen((o) => !o)}
              aria-label="Notifications"
              className="p-2.5 rounded-full hover:bg-violet-100 dark:hover:bg-violet-900/40 relative bj-nav-text dark:text-violet-200"
            >
              <Bell size={18} />
              {alerts.length > 0 && (
                <span className="absolute -top-0.5 -right-0.5 w-4 h-4 rounded-full bg-pink-500 text-white text-xs flex items-center justify-center">

// ---------- transactions ----------

function buildReportRows(txns, categories, accounts) {
  return txns.map((t) => {
    const acc = accounts.find((a) => a.id === t.accountId);
    if (t.type === "transfer") {
      const toAcc = accounts.find((a) => a.id === t.toAccountId);
      return {
        Date: new Date(t.date).toLocaleDateString(),
        Type: "transfer",
        Category: "",
        Account: `${acc?.name || ""} → ${toAcc?.name || ""}`,
        Note: t.note || "",
        Amount: Number(t.amount).toFixed(2),
      };
    }
    const cat = catDisplay(categories, t.categoryId);
    return {
      Date: new Date(t.date).toLocaleDateString(),
      Type: t.type,
      Category: cat.name,
      Account: acc?.name || "",
      Note: t.note || "",
      Amount: Number(t.amount).toFixed(2),
    };
  });
}

function exportCSV(txns, categories, accounts) {
  const rows = buildReportRows(txns, categories, accounts);
  const csv = Papa.unparse(rows);
  const blob = new Blob([csv], { type: "text/csv" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `bloomjar-transactions-${new Date().toISOString().slice(0, 10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function exportExcel(txns, categories, accounts) {
  const rows = buildReportRows(txns, categories, accounts);
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Transactions");
  XLSX.writeFile(wb, `bloomjar-transactions-${new Date().toISOString().slice(0, 10)}.xlsx`);
}

function escapeHtml(str) {
  return String(str ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

function printReport(txns, categories, accounts) {
  const rows = buildReportRows(txns, categories, accounts);
  const income = rows.filter((r) => r.Type === "income").reduce((s, r) => s + Number(r.Amount), 0);
  const expense = rows.filter((r) => r.Type === "expense").reduce((s, r) => s + Number(r.Amount), 0);
  const rowsHtml = rows.map((r) => `
    <tr>
      <td>${escapeHtml(r.Date)}</td><td>${escapeHtml(r.Type)}</td><td>${escapeHtml(r.Category)}</td><td>${escapeHtml(r.Account)}</td>
      <td>${escapeHtml(r.Note)}</td><td style="text-align:right">${money(Number(r.Amount))}</td>
    </tr>`).join("");
  const html = `
    <html><head><title>Bloomjar report</title>
    <style>
      body{font-family:Arial,sans-serif;color:#221D34;padding:24px;}
      h1{margin-bottom:4px;} .sub{color:#8B84AE;margin-bottom:20px;}
      table{width:100%;border-collapse:collapse;font-size:13px;}
      th,td{padding:8px;border-bottom:1px solid #EDE9FE;text-align:left;}
      th{background:#F5F2FF;}
      .summary{display:flex;gap:24px;margin-bottom:20px;}
      .card{border:1px solid #EDE9FE;border-radius:12px;padding:12px 16px;}
    </style></head><body>
    <h1>Bloomjar — Transaction Report</h1>
    <div class="sub">Generated ${new Date().toLocaleDateString()} · ${rows.length} transactions</div>
    <div class="summary">
      <div class="card"><div class="sub">Total income</div><strong>${money(income)}</strong></div>
      <div class="card"><div class="sub">Total expenses</div><strong>${money(expense)}</strong></div>
      <div class="card"><div class="sub">Net</div><strong>${money(income - expense)}</strong></div>
    </div>
    <table><thead><tr><th>Date</th><th>Type</th><th>Category</th><th>Account</th><th>Note</th><th>Amount</th></tr></thead>
    <tbody>${rowsHtml}</tbody></table>
    </body></html>`;
  const win = window.open("", "_blank");
  if (!win) {
    alert("Your browser blocked the report window. Please allow pop-ups for this site, or use CSV/Excel export instead.");
    return;
  }
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 300);
}

function TxnCard({ t, categories, accounts, onEdit, onDelete, compact }) {
  const [dragX, setDragX] = useState(0);
  const dragState = useRef({ startX: 0, dragging: false });

  const acc = accounts.find((a) => a.id === t.accountId);

  function handlePointerDown(e) {
    if (compact) return;
    dragState.current = { startX: e.clientX, dragging: true };
  }
  function handlePointerMove(e) {
    if (!dragState.current.dragging) return;
    const delta = e.clientX - dragState.current.startX;
    setDragX(Math.max(-88, Math.min(88, delta)));
  }
  function handlePointerUp() {
    if (!dragState.current.dragging) return;
    dragState.current.dragging = false;
    if (dragX > 56) onEdit(t);
    else if (dragX < -56) onDelete(t.id);
    setDragX(0);
  }

  if (t.type === "transfer") {
    const toAcc = accounts.find((a) => a.id === t.toAccountId);
    return (
      <div className="flex items-center gap-3 p-3 sm:p-4 rounded-2xl bj-card border border-violet-100 dark:border-violet-900/40">
        <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg shrink-0 bg-blue-100 dark:bg-blue-900/30">↔️</div>
        <div className="flex-1 min-w-0">
          <div className="font-medium text-sm truncate">{t.note || "Transfer"}</div>
          <div className="text-xs bj-muted truncate">{acc?.name} → {toAcc?.name} · {new Date(t.date).toLocaleDateString()}</div>
        </div>
        <div className="font-display font-semibold shrink-0">{money(Math.abs(Number(t.amount)))}</div>
        {!compact && (
          <div className="flex items-center gap-1 shrink-0">
            <button onClick={() => onEdit(t)} aria-label="Edit transaction" className="p-2 rounded-full hover:bg-violet-100 dark:hover:bg-violet-900/40"><Pencil size={14} /></button>
            <button onClick={() => onDelete(t.id)} aria-label="Delete transaction" className="p-2 rounded-full hover:bg-red-100 text-red-500"><Trash2 size={14} /></button>
          </div>
        )}
      </div>
    );
  }

  const cat = catDisplay(categories, t.categoryId);

  return (
    <div className="relative overflow-hidden rounded-2xl">
      {!compact && (
        <div className="absolute inset-0 flex items-center justify-between px-5 text-white text-sm font-semibold">
          <span className="bg-violet-500 rounded-full px-3 py-1">Edit</span>
          <span className="bg-red-500 rounded-full px-3 py-1">Delete</span>
        </div>
      )}
      <div
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
        onPointerLeave={handlePointerUp}
        style={{ transform: `translateX(${dragX}px)`, transition: dragState.current.dragging ? "none" : "transform 0.2s", touchAction: "pan-y" }}
        className="relative flex items-center gap-3 p-3 sm:p-4 rounded-2xl bj-card border border-violet-100 dark:border-violet-900/40"
      >
        <div className="w-10 h-10 rounded-full flex items-center justify-center text-lg shrink-0" style={{ background: cat.color + "22" }}>
          {cat.icon}
        </div>
        <div className="flex-1 min-w-0">
          <div className="font-medium text-sm truncate">{t.note || cat.name}</div>
          <div className="text-xs bj-muted truncate">
            {cat.name} · {acc?.name} · {new Date(t.date).toLocaleDateString()}
          </div>
        </div>
        <div className={`font-display font-semibold shrink-0 ${t.type === "income" ? "text-green-600" : "bj-text"}`}>
          {t.type === "income" ? "+" : "-"}{money(Math.abs(Number(t.amount)))}
        </div>
        {!compact && (
          <div className="flex items-center gap-1 shrink-0">
            <button onClick={() => onEdit(t)} aria-label="Edit transaction" className="p-2 rounded-full hover:bg-violet-100 dark:hover:bg-violet-900/40"><Pencil size={14} /></button>
            <button onClick={() => onDelete(t.id)} aria-label="Delete transaction" className="p-2 rounded-full hover:bg-red-100 text-red-500"><Trash2 size={14} /></button>
          </div>
        )}
      </div>
    </div>
  );
}

// ---------- budgets ----------

function BudgetsPage({ budgetSettings, setBudgetSettings, categories, categoryGroups, updateCategoryGroup, budgetStats, incomeTarget, budgetHistory }) {
  const pctTotal = Number(budgetSettings.needsPct) + Number(budgetSettings.wantsPct) + Number(budgetSettings.savingsPct);
  const expenseCats = categories.filter((c) => !c.parentId && c.id !== "cat-income");

  function setPct(key, val) {
    setBudgetSettings((prev) => ({ ...prev, [key]: Number(val) }));
  }

  return (
    <div className="space-y-6">
      <div className="font-display text-2xl font-semibold">Budgets</div>

      <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40 space-y-4">
        <div className="flex items-center justify-between flex-wrap gap-2">
          <div className="font-display font-semibold">Monthly income target</div>
          <label className="flex items-center gap-2 text-sm bj-muted">
            <input
              type="checkbox"
              checked={budgetSettings.useCustomIncome}
              onChange={(e) => setBudgetSettings((p) => ({ ...p, useCustomIncome: e.target.checked }))}
            />
            Use custom amount
          </label>
        </div>
        {budgetSettings.useCustomIncome ? (
          <input
            type="number" step="0.01" value={budgetSettings.customIncome}
            onChange={(e) => setBudgetSettings((p) => ({ ...p, customIncome: e.target.value }))}
            className={inputCls} placeholder="Monthly income"
          />
        ) : (
          <div className="text-sm bj-muted">
            Using this month's actual income: <span className="font-semibold bj-text">{money(incomeTarget)}</span>
          </div>
        )}
      </div>

      <div className="rounded-3xl p-5 sm:p-6 bg-gradient-to-br from-violet-600 via-fuchsia-500 to-pink-500 text-white">
        {(() => {
          const totalAllocated = ["needs", "wants", "savings"].reduce((s, k) => s + budgetStats[k].allocated, 0);
          const totalSpent = ["needs", "wants", "savings"].reduce((s, k) => s + budgetStats[k].spent, 0);
          const pct = totalAllocated > 0 ? Math.min(100, Math.round((totalSpent / totalAllocated) * 100)) : 0;
          const over = totalSpent > totalAllocated;
          return (
            <>
              <div className="text-sm text-white/80">Total budget this month</div>
              <div className="font-display text-3xl font-bold mt-1">{money(totalSpent)} <span className="text-lg font-medium text-white/70">of {money(totalAllocated)}</span></div>
              <div className="h-2.5 rounded-full bg-white/20 overflow-hidden mt-3">
                <div className="h-full rounded-full bg-white" style={{ width: `${pct}%`, opacity: over ? 0.9 : 1 }} />
              </div>
              <div className="text-xs text-white/80 mt-2">
                {over ? `Over by ${money(totalSpent - totalAllocated)} combined, even though some groups may still have room.` : `${money(totalAllocated - totalSpent)} left across all groups combined.`}
              </div>
            </>
          );
        })()}
      </div>

      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
        {["needs", "wants", "savings"].map((key) => {
          const info = GROUP_INFO[key];
          const stat = budgetStats[key];
          const pct = stat.allocated > 0 ? Math.min(100, Math.round((stat.spent / stat.allocated) * 100)) : 0;
          const over = stat.spent > stat.allocated;
          return (
            <div key={key} className="rounded-3xl p-5 bj-card border border-violet-100 dark:border-violet-900/40">
              <div className="flex items-center justify-between mb-2">
                <div className="font-display font-semibold" style={{ color: info.color }}>{info.label}</div>
                <div className="flex items-center gap-1 text-sm">
                  <input
                    type="number" min="0" max="100"
                    value={budgetSettings[`${key}Pct`]}
                    onChange={(e) => setPct(`${key}Pct`, e.target.value)}
                    className="w-14 rounded-full px-2 py-1 text-center bg-violet-50 bj-input-dark border border-violet-100 dark:border-violet-900/40"
                  />
                  <span className="bj-muted">%</span>
                </div>
              </div>
              <div className="text-xs bj-muted mb-2">{money(stat.spent)} of {money(stat.allocated)}</div>
              <div className="h-2.5 rounded-full bg-violet-50 bj-input-dark overflow-hidden">
                <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: over ? "#FF6B6B" : info.color }} />
              </div>
            </div>
          );
        })}
      </div>
      {pctTotal !== 100 && (
        <div className="text-xs text-amber-600 -mt-2">Heads up — your percentages add up to {pctTotal}%, not 100%.</div>
      )}

      <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40">
        <div className="font-display font-semibold mb-1">Budget history</div>
        <div className="text-xs bj-muted mb-4">Needs / Wants / Savings spending over the last 6 months</div>
        <div style={{ width: "100%", height: 220 }}>
          <SimpleBarChart
            data={budgetHistory}
            xKey="month"
            height={220}
            yFormatter={(v) => `CA$${v}`}
            bars={[
              { key: "Needs", color: GROUP_INFO.needs.color, stackId: "a" },
              { key: "Wants", color: GROUP_INFO.wants.color, stackId: "a" },
              { key: "Savings", color: GROUP_INFO.savings.color, stackId: "a" },
            ]}
          />
        </div>
        <div className="flex flex-wrap gap-2 mt-3">
          {budgetHistory.map((m) => (
            <div key={m.month} className="flex-1 min-w-[70px] text-center">
              <div className="text-xs bj-muted">{m.month}</div>
              <div className={`text-xs font-semibold ${m.pct === null ? "bj-muted" : m.pct > 100 ? "text-red-500" : "text-green-600"}`}>
                {m.pct === null ? "—" : `${m.pct}%`}
              </div>
            </div>
          ))}
        </div>
      </div>

      <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40">
        <div className="font-display font-semibold mb-4">Assign categories to a group</div>
        <div className="space-y-2">
          {expenseCats.map((c) => (
            <div key={c.id} className="flex items-center justify-between gap-3 py-1.5">
              <div className="flex items-center gap-2 text-sm">
                <span>{c.icon}</span> {c.name}
              </div>
              <select
                value={categoryGroups[c.id] || ""}
                onChange={(e) => updateCategoryGroup(c.id, e.target.value)}
                className="rounded-full px-3 py-1.5 text-xs bg-violet-50 bj-input-dark border border-violet-100 dark:border-violet-900/40"
              >
                <option value="">Ignore</option>
                <option value="needs">Needs</option>
                <option value="wants">Wants</option>
                <option value="savings">Savings</option>
              </select>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ---------- debt ----------

function DebtPage({ debts, extraPayment, setExtraPayment, avalanche, minimumOnly, totalDebt, totalMinPayments, debtFreeDate, onAdd, onEdit, onDelete }) {
  const ordered = [...debts].sort((a, b) => Number(b.apr) - Number(a.apr));
  const interestSaved = Math.max(0, minimumOnly.totalInterest - avalanche.totalInterest);
  const monthsSaved = Math.max(0, minimumOnly.months - avalanche.months);

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <div className="font-display text-2xl font-semibold">Debt</div>
        <button onClick={onAdd} className="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-violet-600 to-pink-500">
          <Plus size={16} /> Debt
        </button>
      </div>

      {debts.length === 0 ? (
        <EmptyState text="No debts logged. Add a loan or credit card to build an avalanche payoff plan." />
      ) : (
        <>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
            <StatCard label="Total debt" value={money(totalDebt)} icon={CreditCard} tint="#FF6B6B" />
            <StatCard label="Monthly minimums" value={money(totalMinPayments)} icon={TrendingDown} tint="#FFB84D" />
            <StatCard label="Debt-free" value={debtFreeDate ? debtFreeDate.toLocaleDateString(undefined, { month: "short", year: "numeric" }) : "—"} icon={Target} tint="#22C55E" />
            <StatCard label="Interest paid (avalanche)" value={money(avalanche.totalInterest)} icon={TrendingUp} tint="#5B8DEF" />
          </div>

          <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40">
            <label className={labelCls}>Extra monthly payment (beyond minimums)</label>
            <input
              type="number" step="0.01" min="0" value={extraPayment}
              onChange={(e) => setExtraPayment(Number(e.target.value) || 0)}
              className={inputCls} placeholder="0.00"
            />
            <div className="text-xs bj-muted mt-2">
              Avalanche method: minimums get paid on everything, extra goes to the highest-APR debt first. Freed-up minimums roll into the next debt once one is paid off.
            </div>

            <div className="grid grid-cols-2 gap-3 mt-4">
              <div className="rounded-2xl p-4 bg-violet-50/60 bj-input-dark">
                <div className="text-xs bj-muted mb-1">Minimums only</div>
                <div className="font-display font-semibold">{minimumOnly.neverPaysOff ? "Never pays off" : `${minimumOnly.months} mo`}</div>
                <div className="text-xs bj-muted">{money(minimumOnly.totalInterest)} interest</div>
              </div>
              <div className="rounded-2xl p-4 bg-gradient-to-br from-violet-600 to-pink-500 text-white">
                <div className="text-xs text-white/80 mb-1">With avalanche</div>
                <div className="font-display font-semibold">{avalanche.months} mo</div>
                <div className="text-xs text-white/80">{money(avalanche.totalInterest)} interest</div>
              </div>
            </div>
            {extraPayment > 0 && !minimumOnly.neverPaysOff && (
              <div className="text-xs text-green-600 mt-3 font-medium">
                You'll save {money(interestSaved)} in interest and finish {monthsSaved} month{monthsSaved === 1 ? "" : "s"} sooner.
              </div>
            )}
            {minimumOnly.neverPaysOff && (
              <div className="text-xs text-red-500 mt-3 font-medium">
                At minimum payments alone, at least one debt's interest outpaces what you're paying — it'll never clear. Adding extra payment is what gets you to debt-free.
              </div>
            )}
          </div>

          {avalanche.schedule.length > 1 && (
            <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40">
              <div className="font-display font-semibold mb-4">Balance over time</div>
              <div style={{ width: "100%", height: 220 }}>
                <SimpleLineChart
                  data={avalanche.schedule}
                  xKey="month"
                  yKey="total"
                  height={220}
                  color="#7C5CFC"
                  showAxes={true}
                  yFormatter={(v) => `CA$${v}`}
                  xFormatter={(m) => `M${m}`}
                />
              </div>
            </div>
          )}

          <div className="rounded-3xl p-5 sm:p-6 bj-card border border-violet-100 dark:border-violet-900/40">
            <div className="font-display font-semibold mb-4">Payoff order (highest APR first)</div>
            <div className="space-y-2">
              {ordered.map((d, i) => {
                const payoffM = avalanche.payoffMonth?.[d.id];
                const payoffDate = payoffM ? (() => { const dt = new Date(); dt.setMonth(dt.getMonth() + payoffM); return dt; })() : null;
                return (
                  <div key={d.id} className="flex items-center gap-3 p-3 sm:p-4 rounded-2xl bg-violet-50/60 bj-input-dark">
                    <div className="w-8 h-8 rounded-full bg-violet-600 text-white text-sm font-semibold flex items-center justify-center shrink-0">
                      {i + 1}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-medium text-sm truncate">{d.name}</div>
                      <div className="text-xs bj-muted">{Number(d.apr)}% APR · Min {money(Number(d.minPayment))}{payoffDate ? ` · Paid off ${payoffDate.toLocaleDateString(undefined, { month: "short", year: "numeric" })}` : ""}</div>
                    </div>
                    <div className="font-display font-semibold shrink-0">{money(Number(d.balance))}</div>
                    <div className="flex items-center gap-1 shrink-0">
                      <button onClick={() => onEdit(d)} aria-label="Edit debt" className="p-2 rounded-full hover:bg-violet-100 dark:hover:bg-violet-900/40"><Pencil size={14} /></button>
                      <button onClick={() => onDelete(d.id)} aria-label="Delete debt" className="p-2 rounded-full hover:bg-red-100 text-red-500"><Trash2 size={14} /></button>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

const labelCls = "text-xs font-medium bj-muted mb-1 block";

function TxnModal({ txn, accounts, categories, suggestCategory, onClose, onSave }) {
  const [type, setType] = useState(txn?.type || "expense");
  const [amount, setAmount] = useState(txn?.amount ?? "");
  const [date, setDate] = useState(txn?.date ? txn.date.slice(0, 10) : new Date().toISOString().slice(0, 10));
  const [accountId, setAccountId] = useState(txn?.accountId || accounts[0]?.id || "");
  const [toAccountId, setToAccountId] = useState(txn?.toAccountId || accounts[1]?.id || "");
  const [categoryId, setCategoryId] = useState(txn?.categoryId || "");
  const [note, setNote] = useState(txn?.note || "");

  const txnTypes = accounts.length >= 2 ? ["expense", "income", "transfer"] : ["expense", "income"];

  function handleFromAccountChange(newAccountId) {
    setAccountId(newAccountId);
    if (toAccountId === newAccountId) {
      const alternative = accounts.find((a) => a.id !== newAccountId);
      setToAccountId(alternative?.id || "");
    }
  }

  const eligibleCats = categories.filter((c) => {
    const top = topAncestor(categories, c.id);
    return type === "income" ? top?.id === "cat-income" : top?.id !== "cat-income";
  });
  const topCats = eligibleCats.filter((c) => !c.parentId);

  const suggestion = !txn && type === "expense" && note ? suggestCategory(note) : null;
  const suggestedCat = suggestion ? categories.find((c) => c.id === suggestion) : null;

  function submit(e) {
    e.preventDefault();

    if (type === "transfer") {
      if (!toAccountId || toAccountId === accountId) return;
      onSave({ id: txn?.id || uid(), type, amount: Number(amount), date: new Date(date).toISOString(), accountId, toAccountId, categoryId: null, note });
      return;
    }
    if (!categoryId) return;
    onSave({
      id: txn?.id || uid(),
      type,
      amount: Number(amount),
      date: new Date(date).toISOString(),
      accountId,
      categoryId,
      note,

        </div>
        {accounts.length < 2 && (

        <div>
          <label className={labelCls}>Amount</label>
          <input required type="number" step="0.01" min="0" value={amount} onChange={(e) => setAmount(e.target.value)} className={inputCls} placeholder="0.00" />
        </div>
        <div>
          <label className={labelCls}>Date</label>
          <input required type="date" value={date} onChange={(e) => setDate(e.target.value)} className={inputCls} />
        </div>
        <div>
          <label className={labelCls}>{type === "transfer" ? "From account" : "Account"}</label>
          <select required value={accountId} onChange={(e) => handleFromAccountChange(e.target.value)} className={inputCls}>
            {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
          </select>
        </div>
        {type === "transfer" && (
          <div>
            <label className={labelCls}>To account</label>
            <select required value={toAccountId} onChange={(e) => setToAccountId(e.target.value)} className={inputCls}>
              {accounts.filter((a) => a.id !== accountId).map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}

        <div>
          <label className={labelCls}>Note</label>
          <input value={note} onChange={(e) => setNote(e.target.value)} className={inputCls} placeholder="Optional" />
        </div>
        {type !== "transfer" && showSuggestion && (
          <button
            type="button"
            onClick={() => setCategoryId(suggestedCat.id)}
            className="flex items-center gap-1.5 px-3 py-1.5 rounded-full text-xs font-medium bg-violet-100 dark:bg-violet-900/40 text-violet-700 dark:text-violet-200 w-fit"

function ImportModal({ accounts, categories, suggestCategory, existingTransactions, onClose, onImport }) {
  const [rawRows, setRawRows] = useState(null);
  const [fileName, setFileName] = useState("");
  const [accountId, setAccountId] = useState(accounts[0]?.id || "");
  const [categoryId, setCategoryId] = useState("cat-shopping");
  const [excludedIds, setExcludedIds] = useState(new Set());
  const [showDupes, setShowDupes] = useState(false);
  const topCats = categories.filter((c) => !c.parentId);

  function handleFile(file) {
    setFileName(file.name);
    Papa.parse(file, {
      header: true,
      skipEmptyLines: true,
      complete: (res) => setRawRows(res.data),
    });
  }

  function findCol(row, candidates) {
    const keys = Object.keys(row);
    for (const cand of candidates) {
      const hit = keys.find((k) => k.toLowerCase().includes(cand));
      if (hit) return hit;
    }
    return keys[0];
  }

  const parsedTxns = useMemo(() => {
    if (!rawRows || rawRows.length === 0) return [];
    const sample = rawRows[0];
    const dateCol = findCol(sample, ["date"]);
    const amountCol = findCol(sample, ["amount", "amt"]);
    const descCol = findCol(sample, ["description", "memo", "merchant", "name"]);

    return rawRows
      .filter((r) => r[amountCol] !== undefined && r[amountCol] !== "")
      .map((r, idx) => {
        const raw = Number(String(r[amountCol]).replace(/[^0-9.-]/g, ""));
        const desc = r[descCol] || "";
        const isExpense = raw < 0;
        let cat = isExpense ? categoryId : "cat-other-income";
        if (isExpense) {
          const suggestion = suggestCategory(desc);
          if (suggestion) cat = suggestion;
        }
        const txn = {
          rowId: idx, // stable per source row — do not regenerate this from randomness here,
          // or every recompute (e.g. changing the fallback category) would reset which rows
          // the exclusion checkboxes below refer to and silently discard the user's choices.
          type: isExpense ? "expense" : "income",
          amount: Math.abs(raw),
          date: r[dateCol] ? new Date(r[dateCol]).toISOString() : new Date().toISOString(),
          accountId,
          categoryId: cat,
          note: desc,
        };
        const dup = findDuplicate(txn, existingTransactions);
        return { ...txn, isDup: !!dup, dupOf: dup || null };
      });
  }, [rawRows, accountId, categoryId, suggestCategory, existingTransactions]);

  const dupes = parsedTxns.filter((t) => t.isDup);
  // Only the row content that findDuplicate actually looks at (rawRows/accountId/existing
  // transactions) should reset which rows are excluded — switching the fallback category
  // recomputes parsedTxns too, but shouldn't wipe out the user's manual include/exclude choices.
  const dupKey = dupes.map((d) => d.rowId).join(",");
  useEffect(() => {
    setExcludedIds(new Set(dupes.map((d) => d.rowId)));
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dupKey]);

  const includedCount = parsedTxns.length - excludedIds.size;

  function toggleExcluded(rowId) {
    setExcludedIds((prev) => {
      const next = new Set(prev);
      if (next.has(rowId)) next.delete(rowId);
      else next.add(rowId);
      return next;
    });
  }

  function doImport() {
    const final = parsedTxns
      .filter((t) => !excludedIds.has(t.rowId))
      .map(({ rowId, isDup, dupOf, ...t }) => ({ ...t, id: uid() }));
    if (final.length === 0) return;
    onImport(final);
  }

  return (
    <ModalShell title="Import CSV" onClose={onClose}>
      {!rawRows ? (
        <label className="flex flex-col items-center justify-center gap-2 border-2 border-dashed border-violet-200 dark:border-violet-800 rounded-2xl py-10 cursor-pointer bj-muted hover:bg-violet-50 dark:hover:bg-violet-900/20">
          <Upload size={24} />
          <span className="text-sm">Tap to choose a CSV file</span>
          <input type="file" accept=".csv" className="hidden" onChange={(e) => e.target.files[0] && handleFile(e.target.files[0])} />
        </label>
      ) : (
        <div className="space-y-3">
          <div className="text-sm bj-muted">
            Found <span className="font-semibold bj-text">{parsedTxns.length}</span> rows in {fileName}. Positive amounts import as income, negative as expenses. Rows matching notes you've categorized before will be auto-tagged.
          </div>
          <div>
            <label className={labelCls}>Import into account</label>
            <select value={accountId} onChange={(e) => setAccountId(e.target.value)} className={inputCls}>
              {accounts.map((a) => <option key={a.id} value={a.id}>{a.name}</option>)}
            </select>
          </div>
          <div>
            <label className={labelCls}>Fallback category for unmatched expenses</label>
            <select value={categoryId} onChange={(e) => setCategoryId(e.target.value)} className={inputCls}>
              {topCats.filter((c) => c.id !== "cat-income").map((c) => <option key={c.id} value={c.id}>{c.icon} {c.name}</option>)}
            </select>
            <div className="text-xs bj-muted mt-1">You can re-categorize individual transactions after import.</div>
          </div>

          {dupes.length > 0 && (
            <div className="rounded-2xl bg-amber-50 dark:bg-amber-900/10 p-3">
              <button type="button" onClick={() => setShowDupes((s) => !s)} className="w-full flex items-center justify-between text-sm font-medium text-amber-700 dark:text-amber-400">
                <span>{dupes.length} row{dupes.length === 1 ? "" : "s"} look{dupes.length === 1 ? "s" : ""} like duplicates — excluded by default</span>
                <span className="text-xs">{showDupes ? "Hide" : "Review"}</span>
              </button>
              {showDupes && (
                <div className="mt-2 space-y-1.5 max-h-48 overflow-y-auto">
                  {dupes.map((t) => (
                    <label key={t.rowId} className="flex items-center gap-2 text-xs bj-muted bg-white bj-input-dark rounded-xl px-2.5 py-2">
                      <input
                        type="checkbox"
                        checked={!excludedIds.has(t.rowId)}
                        onChange={() => toggleExcluded(t.rowId)}
                      />
                      <span className="flex-1 truncate">{t.note || "(no note)"} · {new Date(t.date).toLocaleDateString()}</span>
                      <span className="font-medium bj-text shrink-0">{money(t.amount)}</span>
                    </label>
                  ))}
                </div>
              )}
              <div className="text-xs text-amber-700 dark:text-amber-400 mt-2">
                Matched against an existing transaction with the same account, amount, and a date within 2 days. Check a box to import it anyway.
              </div>
            </div>
          )}

          <button
            onClick={doImport}
            disabled={includedCount === 0}
            className="w-full py-3 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-violet-600 to-pink-500 disabled:opacity-40"
          >
            Import {includedCount} transaction{includedCount === 1 ? "" : "s"}
          </button>
        </div>
      )}
    </ModalShell>
  );
}

          value={pin}
          onChange={(e) => { setPin(e.target.value.replace(/\D/g, "")); setError(false); }}
          style={{ letterSpacing: "0.5em" }}
          className="w-full text-center text-2xl rounded-2xl px-4 py-3 bj-lock-input border border-violet-100 dark:border-violet-900/40 outline-none focus:ring-2 focus:ring-violet-400"
          placeholder="••••"
        />
        {error && <div className="text-xs text-red-500">Wrong PIN — try again.</div>}
        <button type="submit" className="w-full py-3 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-violet-600 to-pink-500">
          Unlock
        </button>
      </form>
    </div>
  );
}

const ONBOARDING_STEPS = [
  { title: "Welcome to Bloomjar", body: "A budget tracker that keeps everything — spending, budgets, goals, and debt payoff — in one colorful place." },
  { title: "Start with your accounts", body: "Head to Accounts to set up checking, savings, credit cards, or cash with their current balances." },
  { title: "Log as you go", body: "Use the Add button to log transactions. Bloomjar learns your categorization habits and starts suggesting categories automatically." },
  { title: "Budgets, goals, and debt", body: "Set a Needs/Wants/Savings budget split, track savings goals, and build an avalanche payoff plan for any debt — all from the nav bar." },
];

function OnboardingModal({ onDone }) {
  const [step, setStep] = useState(0);
  const isLast = step === ONBOARDING_STEPS.length - 1;
  const current = ONBOARDING_STEPS[step];

  return (
    <div className="fixed inset-0 z-40 flex items-end sm:items-center justify-center bg-black/40 p-0 sm:p-4">
      <div className="w-full sm:max-w-sm bj-card rounded-t-3xl sm:rounded-3xl p-6 text-center">
        <div className="flex items-center justify-center gap-1.5 mb-5">
          {ONBOARDING_STEPS.map((_, i) => (
            <div key={i} className={`h-1.5 rounded-full transition-all ${i === step ? "w-6 bg-violet-600" : "w-1.5 bg-violet-100 dark:bg-violet-900/40"}`} />
          ))}
        </div>
        <div className="font-display text-xl font-semibold mb-2">{current.title}</div>
        <div className="text-sm bj-muted mb-6">{current.body}</div>
        <div className="flex gap-2">
          {!isLast && (
            <button onClick={onDone} className="flex-1 py-2.5 rounded-full text-sm font-semibold bg-violet-50 bj-input-dark bj-muted">
              Skip
            </button>
          )}
          <button
            onClick={() => (isLast ? onDone() : setStep((s) => s + 1))}
            className="flex-1 py-2.5 rounded-full text-sm font-semibold text-white bg-gradient-to-r from-violet-600 to-pink-500"
          >
            {isLast ? "Get started" : "Next"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ---------- misc ----------

function UndoToast({ text, onUndo, onDismiss }) {
  return (
    <div style={{ background: "#221D34" }} className="fixed bottom-5 left-1/2 -translate-x-1/2 z-40 flex items-center gap-3 pl-4 pr-2 py-2 rounded-full text-white shadow-lg text-sm">
      <span>{text}</span>
      <button onClick={onUndo} className="font-semibold text-violet-300 px-2 py-1 rounded-full hover:bg-white/10">Undo</button>
      <button onClick={onDismiss} aria-label="Dismiss" className="p-1 rounded-full hover:bg-white/10"><X size={14} /></button>
    </div>
  );
}

function EmptyState({ text }) {
  return (
    <div className="text-center py-10 text-sm bj-muted">
      {text}
    </div>
  );
}


// ---------- mount ----------
ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
